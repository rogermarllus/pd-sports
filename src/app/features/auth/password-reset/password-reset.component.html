<form id="form-password-reset" [formGroup]="form" (ngSubmit)="onSubmit()">
    <figure>
        <img src="/img/svg/logo.svg" alt="logo-PD-Sports" class="img-logo" />
        <figcaption>logo PD Sports</figcaption>
    </figure>

    <h2>Recuperar Senha</h2>

    <div class="container-input">
        <label class="subtitle-input">Informe o e-mail cadastrado</label>
        <input type="email" id="input-email" class="input-email" placeholder="emailexemplo@gmail.com"
            formControlName="email" appFieldError [control]="emailCtrl" />
    </div>

    <div class="recaptcha" [class.invalid]="recaptchaCtrl.touched && recaptchaCtrl.invalid">
        <div class="recaptcha-checkbox-container">
            <input type="checkbox" id="recaptcha" formControlName="recaptcha" />
            <label for="recaptcha">Não sou um robô</label>
        </div>
        <div class="recaptcha-logo">
            <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="reCAPTCHA" />
            <small>reCAPTCHA</small>
        </div>
    </div>

    <div class="container-buttons">
        <a routerLink="/auth/login" class="btn-voltar">Voltar</a>
        <button type="submit" class="botao" [disabled]="isLoading()">
            {{ isLoading() ? 'Enviando...' : 'Enviar' }}
        </button>
    </div>
</form>

@if (showModal()) {
<div class="modal-overlay">
    <div class="modal-card">
        <svg class="modal-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <path d="m9 12 2 2 4-4" />
        </svg>
        <h3>Instruções Enviadas!</h3>
        <p>
            As instruções para a recuperação da sua senha foram enviadas com sucesso para o e-mail
            informado.
        </p>
        <button type="button" class="botao-modal" (click)="closeModal()">Ok</button>
    </div>
</div>
}
