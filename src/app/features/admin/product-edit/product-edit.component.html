<nav class="admin-navbar">
  <div class="container">
    <div class="admin-navbar-inner">
      <a [routerLink]="['/']" class="admin-logo">
        <img src="img/svg/logo.svg" alt="PD Sports" />
      </a>
      <div class="admin-nav-actions">
        <a [routerLink]="['/admin/produtos']" class="btn-admin-nav">
          <i class="bi bi-chevron-left"></i> Estoque
        </a>
        <button id="btn-sair" class="btn-admin-nav" type="button" (click)="onLogout()">
          Sair <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>
  </div>
</nav>

<main class="container page-form-wrapper">
  <div class="page-form-back">
    <a [routerLink]="['/admin/produtos']" class="botao-outline">
      <i class="bi bi-arrow-left"></i> Voltar
    </a>
  </div>

  <h2 class="page-form-title">Edição de produto</h2>

  @if (isLoading) {
    <div class="text-center my-5 text-secondary">
      <div class="spinner-border text-warning mb-2" role="status"></div>
      <p>A carregar dados do produto...</p>
    </div>
  } @else if (hasError) {
    <div class="alert alert-danger my-4 text-center" role="alert">
      Não foi possível carregar os dados deste produto.
      <br />
      <button class="btn btn-sm btn-outline-danger mt-3" (click)="ngOnInit()">
        Tentar Novamente
      </button>
    </div>
  } @else {
    <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
      <div class="form-grid-page">
        <div class="form-field">
          <label for="edit-name">Nome</label>
          <input id="edit-name" type="text" formControlName="name" />
        </div>

        <div class="form-field">
          <label for="edit-modality">Modalidade</label>
          <select id="edit-modality" formControlName="modality">
            <option value="" disabled>Selecione</option>
            @for (modality of modalitiesList; track modality) {
              <option [value]="modality">{{ modality }}</option>
            }
          </select>
        </div>

        <div class="form-field form-field-descricao">
          <label for="edit-desc">Descrição</label>
          <textarea id="edit-desc" formControlName="description"></textarea>
        </div>

        <div class="form-field">
          <label for="edit-price">Preço</label>
          <input id="edit-price" type="text" formControlName="price" placeholder="0.00" />
        </div>

        <div class="form-field">
          <label for="edit-amount">Quantidade</label>
          <input id="edit-amount" type="number" min="0" formControlName="amount" />
        </div>

        <div class="form-field">
          <label for="edit-color">Cor</label>
          <input id="edit-color" type="text" formControlName="color" />
        </div>

        <div class="form-field">
          <label for="edit-variation">Tipo de variação</label>
          <select id="edit-variation" formControlName="variationType">
            <option value="" disabled>Selecione</option>
            <option value="Nenhuma">Nenhuma</option>
            <option value="Letra">Letra</option>
            <option value="Numeração">Numeração</option>
          </select>
        </div>

        <div class="form-field">
          <label>Imagem (não utilizada no MVP)</label>
          <input type="file" disabled />
        </div>
      </div>

      <div class="page-form-actions">
        <button
          type="submit"
          class="botao page-form-save"
          [disabled]="productForm.invalid || isSaving"
        >
          {{ isSaving ? 'A guardar...' : 'Salvar Alterações' }}
        </button>
      </div>
    </form>
  }
</main>

<footer class="admin-footer">
  <div class="container">
    <p>© 2026 PD Sports. Todos os Direitos Reservados</p>
  </div>
</footer>
